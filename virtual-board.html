<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>バーチャル役員会</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #root { width: 100%; max-width: 820px; display: flex; flex-direction: column; min-height: 100vh; }

    .header {
      background: linear-gradient(135deg, #1e3a2f 0%, #2f5d3a 55%, #3f7a4a 100%);
      color: white;
      padding: 20px 24px;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    .header h1 {
      font-size: 19px;
      font-weight: 700;
      letter-spacing: 0.03em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header p {
      font-size: 12px;
      opacity: 0.72;
      margin-top: 4px;
      line-height: 1.6;
    }

    .api-key-bar {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .api-key-bar label {
      font-size: 12px;
      color: #6b7280;
      white-space: nowrap;
      font-weight: 500;
    }

    .api-key-bar input {
      flex: 1;
      font-size: 13px;
      padding: 6px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-family: monospace;
      color: #374151;
      outline: none;
      transition: border-color 0.2s;
    }

    .api-key-bar input:focus { border-color: #3f7a4a; }

    .main {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px 32px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    /* 役員ロースター */
    .roster {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
    }

    .roster-card {
      border-radius: 12px;
      padding: 12px 14px;
      color: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.12);
    }

    .roster-card .rc-name {
      font-size: 13.5px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .roster-card .rc-role {
      font-size: 11px;
      opacity: 0.9;
      margin-top: 3px;
      line-height: 1.4;
    }

    /* 議題入力 */
    .agenda-box {
      background: white;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .agenda-box label {
      font-size: 13px;
      font-weight: 700;
      color: #1f2937;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .agenda-box textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 12px;
      font-size: 14px;
      font-family: inherit;
      line-height: 1.6;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
      min-height: 88px;
    }

    .agenda-box textarea:focus { border-color: #3f7a4a; }

    .example-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12px;
      color: #6b7280;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .chip:hover { background: #e6f2e9; border-color: #93c9a3; color: #256b3a; }

    .btn-open {
      background: linear-gradient(135deg, #2f5d3a, #3f7a4a);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 13px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-open:hover:not(:disabled) { opacity: 0.92; transform: translateY(-1px); }
    .btn-open:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-reset {
      background: #f3f4f6;
      color: #6b7280;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 9px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      align-self: center;
      transition: all 0.15s;
    }
    .btn-reset:hover { background: #e5e7eb; color: #374151; }

    /* 議題見出し */
    .agenda-title {
      background: #eef4f0;
      border-left: 4px solid #3f7a4a;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.6;
      color: #1f2937;
    }
    .agenda-title .at-label {
      font-size: 11px;
      font-weight: 700;
      color: #3f7a4a;
      display: block;
      margin-bottom: 3px;
    }

    /* 発言カード */
    .opinion {
      display: flex;
      gap: 10px;
    }

    .opinion .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      color: white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.18);
    }

    .opinion .body { flex: 1; min-width: 0; }

    .opinion .name-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 4px;
      flex-wrap: wrap;
    }

    .opinion .name { font-size: 13.5px; font-weight: 700; }
    .opinion .role-tag { font-size: 11px; color: #9ca3af; }

    .opinion .bubble {
      background: white;
      border-radius: 14px;
      border-top-left-radius: 4px;
      padding: 12px 15px;
      font-size: 14px;
      line-height: 1.7;
      color: #1f2937;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      border-left: 4px solid #ddd;
    }

    /* 議長まとめ */
    .chair-block {
      background: linear-gradient(135deg, #f0f7f2, #e3f0e7);
      border: 1.5px solid #7bb98d;
      border-radius: 14px;
      padding: 20px;
      font-size: 14px;
      line-height: 1.85;
      color: #1f2937;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: 0 2px 8px rgba(63,122,74,0.16);
    }

    .chair-block h2 {
      font-size: 16px;
      font-weight: 700;
      color: #1e4d2b;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .typing-indicator {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 6px 2px;
    }
    .typing-indicator span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #9ca3af;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .status-line {
      font-size: 12.5px;
      color: #6b7280;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }

    .error-msg {
      font-size: 13px;
      color: #dc2626;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 9px 12px;
      text-align: center;
    }

    .section-label {
      font-size: 12px;
      font-weight: 700;
      color: #9ca3af;
      letter-spacing: 0.04em;
      margin-top: 4px;
    }

    .note {
      font-size: 11.5px;
      color: #9ca3af;
      line-height: 1.6;
      text-align: center;
      padding: 0 8px;
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

const MODEL = 'claude-sonnet-4-20250514';

// ── 役員メンバー定義 ──────────────────────────────
const BOARD = [
  {
    id: 'growth',
    name: '成長責任者',
    emoji: '📈',
    role: '攻めの意見を出す',
    color: '#d97b34',
    prompt: `あなたは「成長責任者（CGO）」です。バーチャル役員会のメンバーとして、常に"攻め"の視点から発言します。
- 事業を伸ばすこと、機会を逃さないこと、挑戦することを最優先に考える。
- 「やらないリスク」「機会損失」を強く意識し、前向きで大胆な選択肢を推す。
- ただし根拠のない精神論ではなく、成長につながる具体的な打ち手を示す。`,
  },
  {
    id: 'finance',
    name: '財務責任者',
    emoji: '💰',
    role: '予算・採算を見る',
    color: '#34567a',
    prompt: `あなたは「財務責任者（CFO）」です。バーチャル役員会のメンバーとして、常にお金と採算の視点から発言します。
- コスト、キャッシュフロー、投資回収、採算性、持続可能性を冷静に評価する。
- 「その判断はいくらかかり、いつ回収できるのか」を必ず問う。
- 感情ではなく数字で語り、財務的に無理のある案にははっきり待ったをかける。`,
  },
  {
    id: 'member',
    name: '会員の代弁者',
    emoji: '👥',
    role: 'お客さんの価値を守る',
    color: '#4a7c3f',
    prompt: `あなたは「会員（顧客）の代弁者」です。バーチャル役員会のメンバーとして、常にお客さん・会員の立場から発言します。
- 「この判断はお客さんにとって嬉しいか、価値が上がるか」を最優先に考える。
- 会社都合の効率化がお客さんの体験を損なわないか目を光らせる。
- 目の前にいる会員が何と言うかを想像し、その声を代弁する。`,
  },
  {
    id: 'devil',
    name: '悪魔の代弁者',
    emoji: '😈',
    role: 'わざと反対意見を言う',
    color: '#a63d3d',
    prompt: `あなたは「悪魔の代弁者」です。バーチャル役員会のメンバーとして、提案に対して"あえて"反対・批判の立場を取ります。
- 全員が賛成しそうな時ほど、見落とされている穴・最悪のシナリオ・前提の誤りを指摘する。
- 同調は禁止。心地よい結論に流れそうな空気にわざと水を差すのが役目。
- ただし難癖ではなく、意思決定の質を上げるための鋭い反論を出す。`,
  },
  {
    id: 'freedom',
    name: '自由の守護者',
    emoji: '🕊️',
    role: '自分の時間を守る',
    color: '#7c5aa6',
    prompt: `あなたは「自由の守護者」です。バーチャル役員会のメンバーとして、意思決定者本人の時間・エネルギー・人生の自由を守る立場で発言します。
- 「その判断は本人を忙しくしすぎないか、自由と余白を奪わないか」を問う。
- 短期の成果のために本人が消耗する選択には歯止めをかける。
- 仕組み化・任せる・やめる、といった"自分の時間を取り戻す"視点を持ち込む。`,
  },
];

const CHAIR = {
  name: '議長AI',
  emoji: '🏛️',
  role: '意見をまとめて報告する',
  color: '#2f5d3a',
};

const CHAIR_PROMPT = `あなたはバーチャル役員会の「議長AI」です。
5人の役員（成長責任者・財務責任者・会員の代弁者・悪魔の代弁者・自由の守護者）がそれぞれの立場から出した意見を受け取り、意思決定者のために公平にまとめます。

以下の形式で、日本語で簡潔に報告してください。

【論点の整理】
今回の議題で本当に問われている核心を1〜2行で言語化する。

【賛成・慎重の色分け】
各役員がどちらに傾いたか（賛成／慎重／条件付き）を一覧で示す。

【対立点】
意見が最も割れているポイントを1〜2点、具体的に指摘する。

【議長からの推奨】
上記を踏まえた現実的な落としどころ・次の一歩を提案する。断定しすぎず、判断材料として示す。

【最終決定は本人へ】
最後に一言、「最終的に決めるのはあなたです」という趣旨を添える。

冷静で中立、かつ意思決定者が動きやすいトーンで書くこと。`;

const EXAMPLES = [
  '新しいサービスを月1万円で始めるか迷っている',
  '値上げすべきか、今の価格を維持すべきか',
  '人を1人採用するか、外注で回すか',
  '土日のイベントを続けるか、やめるか',
];

function buildMemberMessages(agenda) {
  return [{
    role: 'user',
    content: `【役員会の議題】\n${agenda}\n\nあなたの立場から、この議題について意見を述べてください。次の形式で、合計200字程度にまとめること。\n\n結論: （賛成 / 慎重 / 条件付き のいずれか）\n理由: （あなたの立場ならではの理由を2〜3点）\n一言: （意思決定者への短いメッセージ）`,
  }];
}

function buildChairMessages(agenda, opinions) {
  const joined = opinions
    .map(o => `■ ${o.name}（${o.role}）\n${o.text}`)
    .join('\n\n');
  return [{
    role: 'user',
    content: `【議題】\n${agenda}\n\n【各役員の意見】\n${joined}\n\n以上を踏まえ、議長として報告をまとめてください。`,
  }];
}

function App() {
  const [apiKey, setApiKey] = useState(() => localStorage.getItem('anthropic_api_key') || '');
  const [agenda, setAgenda] = useState('');
  const [submittedAgenda, setSubmittedAgenda] = useState('');
  const [opinions, setOpinions] = useState({}); // id -> { text, done }
  const [chairText, setChairText] = useState('');
  const [phase, setPhase] = useState('idle'); // idle | debating | summarizing | done
  const [error, setError] = useState('');
  const bottomRef = useRef(null);

  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [opinions, chairText, phase]);

  const saveApiKey = (val) => {
    setApiKey(val);
    localStorage.setItem('anthropic_api_key', val);
  };

  const callAPI = useCallback(async (system, messages) => {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({ model: MODEL, max_tokens: 1024, system, messages }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `API Error ${res.status}`);
    }
    const data = await res.json();
    return data.content[0].text;
  }, [apiKey]);

  const openBoard = useCallback(async () => {
    const topic = agenda.trim();
    if (!topic) { setError('議題を入力してください'); return; }
    if (!apiKey.trim()) { setError('APIキーを入力してください'); return; }

    setError('');
    setSubmittedAgenda(topic);
    setChairText('');
    setOpinions(Object.fromEntries(BOARD.map(m => [m.id, { text: '', done: false }])));
    setPhase('debating');

    // 5人の役員を並列で招集
    const results = [];
    await Promise.all(BOARD.map(async (member) => {
      try {
        const text = await callAPI(member.prompt, buildMemberMessages(topic));
        results.push({ id: member.id, name: member.name, role: member.role, text });
        setOpinions(prev => ({ ...prev, [member.id]: { text, done: true } }));
      } catch (e) {
        const text = `（発言できませんでした: ${e.message}）`;
        results.push({ id: member.id, name: member.name, role: member.role, text });
        setOpinions(prev => ({ ...prev, [member.id]: { text, done: true } }));
      }
    }));

    // 議長がまとめる（役員の並び順で整列）
    setPhase('summarizing');
    const ordered = BOARD.map(m => results.find(r => r.id === m.id)).filter(Boolean);
    try {
      const summary = await callAPI(CHAIR_PROMPT, buildChairMessages(topic, ordered));
      setChairText(summary);
      setPhase('done');
    } catch (e) {
      setError('議長のまとめに失敗しました: ' + e.message);
      setPhase('done');
    }
  }, [agenda, apiKey, callAPI]);

  const reset = () => {
    setSubmittedAgenda('');
    setOpinions({});
    setChairText('');
    setPhase('idle');
    setError('');
    setAgenda('');
  };

  const running = phase === 'debating' || phase === 'summarizing';

  return (
    <>
      <div className="header">
        <h1>🏛️ バーチャル役員会</h1>
        <p>役割の違うAI役員5人＋議長が、あなたの「迷い」を会議で揉んで報告します</p>
      </div>

      <div className="api-key-bar">
        <label>Anthropic API Key:</label>
        <input
          type="password"
          value={apiKey}
          onChange={e => saveApiKey(e.target.value)}
          placeholder="sk-ant-..."
          spellCheck={false}
        />
      </div>

      <div className="main">
        {/* 役員紹介 */}
        <div>
          <div className="section-label">出席役員</div>
        </div>
        <div className="roster">
          {BOARD.map(m => (
            <div key={m.id} className="roster-card" style={{ background: m.color }}>
              <div className="rc-name">{m.emoji} {m.name}</div>
              <div className="rc-role">{m.role}</div>
            </div>
          ))}
          <div className="roster-card" style={{ background: CHAIR.color }}>
            <div className="rc-name">{CHAIR.emoji} {CHAIR.name}</div>
            <div className="rc-role">{CHAIR.role}</div>
          </div>
        </div>

        {/* 議題入力（会議前のみ） */}
        {phase === 'idle' && (
          <div className="agenda-box">
            <label>🗒️ 迷っていること・決めたいことを書いてください</label>
            <textarea
              value={agenda}
              onChange={e => setAgenda(e.target.value)}
              placeholder="例）新しいサービスを月1万円で始めるべきか迷っている。会員は喜ぶ気がするが、手間も増える…"
            />
            <div className="example-chips">
              {EXAMPLES.map((ex, i) => (
                <button key={i} className="chip" onClick={() => setAgenda(ex)}>{ex}</button>
              ))}
            </div>
            <button className="btn-open" onClick={openBoard} disabled={!agenda.trim()}>
              🏛️ 役員会を開く
            </button>
          </div>
        )}

        {/* 議題表示 */}
        {submittedAgenda && (
          <div className="agenda-title">
            <span className="at-label">本日の議題</span>
            {submittedAgenda}
          </div>
        )}

        {/* 役員の発言 */}
        {submittedAgenda && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: '14px' }}>
            {BOARD.map(m => {
              const op = opinions[m.id];
              return (
                <div key={m.id} className="opinion">
                  <div className="avatar" style={{ background: m.color }}>{m.emoji}</div>
                  <div className="body">
                    <div className="name-row">
                      <span className="name" style={{ color: m.color }}>{m.name}</span>
                      <span className="role-tag">{m.role}</span>
                    </div>
                    <div className="bubble" style={{ borderLeftColor: m.color }}>
                      {op && op.text
                        ? op.text
                        : <div className="typing-indicator"><span /><span /><span /></div>}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* 進行ステータス */}
        {phase === 'debating' && (
          <div className="status-line">🗣️ 役員が意見を出しています…</div>
        )}
        {phase === 'summarizing' && (
          <div className="status-line">🏛️ 議長が意見をまとめています…</div>
        )}

        {/* 議長のまとめ */}
        {chairText && (
          <div className="chair-block">
            <h2>🏛️ 議長からの報告</h2>
            {chairText}
          </div>
        )}

        {error && <div className="error-msg">⚠️ {error}</div>}

        {/* もう一度 */}
        {phase === 'done' && (
          <button className="btn-reset" onClick={reset}>🔄 別の議題で開き直す</button>
        )}

        <p className="note">
          ※ APIキーはこのブラウザ内だけに保存され、Anthropicへの通信以外には送信されません。<br />
          最終的な意思決定はあなた自身が行うためのものです。
        </p>

        <div ref={bottomRef} />
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
