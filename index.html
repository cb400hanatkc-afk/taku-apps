<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taku's Management Coaching</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #root { width: 100%; max-width: 760px; display: flex; flex-direction: column; min-height: 100vh; }

    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: white;
      padding: 20px 24px;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    .header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .header p {
      font-size: 12px;
      opacity: 0.65;
      margin-top: 3px;
    }

    .api-key-bar {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .api-key-bar label {
      font-size: 12px;
      color: #6b7280;
      white-space: nowrap;
      font-weight: 500;
    }

    .api-key-bar input {
      flex: 1;
      font-size: 13px;
      padding: 6px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-family: monospace;
      color: #374151;
      outline: none;
      transition: border-color 0.2s;
    }

    .api-key-bar input:focus { border-color: #6366f1; }

    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      gap: 10px;
      max-width: 100%;
    }

    .message.user { flex-direction: row-reverse; }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .message.assistant .avatar { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
    .message.user .avatar { background: linear-gradient(135deg, #059669, #10b981); color: white; font-size: 13px; font-weight: 700; }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.7;
      max-width: calc(100% - 52px);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.assistant .bubble {
      background: white;
      color: #1f2937;
      border-top-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .message.user .bubble {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      border-top-right-radius: 4px;
    }

    .summary-block {
      background: linear-gradient(135deg, #fefce8, #fef9c3);
      border: 1.5px solid #fbbf24;
      border-radius: 12px;
      padding: 20px;
      font-size: 14px;
      line-height: 1.8;
      color: #1f2937;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: 0 2px 8px rgba(251,191,36,0.2);
    }

    .summary-block h2 {
      font-size: 16px;
      font-weight: 700;
      color: #92400e;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .typing-indicator {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 16px;
    }

    .typing-indicator span {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #9ca3af;
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .input-area {
      background: white;
      border-top: 1px solid #e5e7eb;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: sticky;
      bottom: 0;
    }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .input-area textarea {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 12px;
      font-size: 14px;
      font-family: inherit;
      line-height: 1.5;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      max-height: 120px;
      min-height: 44px;
    }

    .input-area textarea:focus { border-color: #6366f1; }

    .btn-send {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.1s;
      height: 44px;
    }

    .btn-send:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .btn-send:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-summary {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      align-self: center;
    }

    .btn-summary:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .btn-summary:disabled { opacity: 0.45; cursor: not-allowed; }

    .bottom-actions {
      display: flex;
      justify-content: center;
    }

    .error-msg {
      font-size: 13px;
      color: #dc2626;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 8px 12px;
      text-align: center;
    }

    .chip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12px;
      color: #6b7280;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .chip:hover { background: #e0e7ff; border-color: #a5b4fc; color: #4338ca; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

const TAKU_DATA = `
【Takuのストレングスファインダー上位資質 TOP5】
1. 学習欲 — 自分の興味のあることをひたすら学ぶ。プログラミング習得スピードが早いのもこの資質。「自己確信×学習欲」の組み合わせで、他人が何と言おうが自分が学びたいものを迷わず学ぶ姿勢がある。
2. 分析思考 — 客観的な事実を大切にし論理的に判断する。感情があまり動かず冷静に事実ベースで判断する。「分析思考×戦略性」で、多種多様な未来の選択肢から道を見つけ、複雑な現実の中から真実を見いだせる。
3. 指令性 — 明確さを求めて疑問を投げかけ議論する。新しい情報を積極的に受け入れる好奇心旺盛な学習者。
4. 戦略性 — いろんなアプローチ方法から最も効率的な方法を選ぶ。あらゆる選択肢を事前に検討する姿勢。「戦略性×個別化」で、人間の豊かな多様性を評価し、実現可能な幅広い選択肢を確認して検討できる。
5. 個別化 — 一人ひとりの異なる特徴を自然に見抜く。相手への影響を考えてアプローチを調整する。「学習欲×個別化」で、物事についても個人についても同じように効果的に学ぶ。

【得意なこと（動詞）】
- 戦略・計画の策定
- 個々の主体性を引き出すための業務設計
- 会議のファシリテート

【個性診断12尺度スコア】
- 話欲度: 60（やや外向き。話題提供の意欲あり）
- 交意度: 40（やや内向き。一人の時間もラク）
- 肯定度: 100（極めて楽観的・ポジティブ）
- 感表度: 35（内向き。感情を表情に出しにくい）
- 寄添度: 30（内向き。相手の感情への寄り添いは意識的に行う必要あり）
- 他中度: 85（外向き。人の意見を優先しやすい）
- 環馴度: 40（内向き。変化を嫌う傾向。一度ハマると継続力を発揮）
- 友好度: 70（やや外向き）
- 創造性・発想度: 65（外向き。いろんなアイデアが思いつきやすい）
- 自立性・個集度: 45（やや内向き。個人主義・マイペース傾向）
- 感深度: 40（内向き。興味関心の幅は狭く深い）
- 現充度: 95（非常に外向き。現状に非常に満足しやすい）

【強み（逃げない場）】
- 個々の主体性を伸ばすコーチング（個別化×成長促進的アプローチ）
- 仮説検証型の思考スタイルを活かした構造設計・業務改善
- 戦略性と分析思考を組み合わせた会議設計・合意形成ファシリテーション

【苦手（逃げてよい場）】
- 細かな感情の察知・共感的フォロー（感表度・寄添度が低い）
- 変化が激しく予測しにくい環境への迅速な適応（環馴度が内向き）
`;

const SYSTEM_PROMPT = `あなたはTakuの専任マネジメントコーチです。以下のTakuの自己理解データを深く読み込んだ上で、対話を通じてTakuのマネジメントスタイルを掘り起こしてください。

${TAKU_DATA}

【あなたの役割と対話スタイル】
- 上記データから仮説を立て、具体的な質問を投げかける
- 例：「学習欲×戦略性の組み合わせからすると、情報を整理して方針を示す役割を自然に担っていそうですが、実際はどうですか？」
- ユーザーの回答を受けて、さらにエピソード・行動レベルまで掘り下げる
- 「実際にどんな場面で？」「その時チームはどう反応しましたか？」など具体性を引き出す
- 表面的な確認で終わらず、1〜2問ずつ丁寧に深堀りする
- 質問は一度に1〜2つに絞り、一問一答の対話リズムを保つ
- 日本語で、コーチらしい温かく知的なトーンで話す

【深掘りのテーマ（意識して質問を設計する軸）】
1. 自分の強み・弱みの自覚（どこで発揮されているか、盲点は何か）
2. チームの動かし方・場の作り方（どんな関わり方をしているか）

【まとめ機能】
ユーザーが「まとめてください」と言った場合、またはシステムから SUMMARY_REQUEST が来た場合、それまでの対話内容をもとに以下の形式でまとめを出力してください：

---
私のマネジメントスタイル

■ 強みとして発揮されること
（具体的に2〜3点、対話で出てきたエピソードを踏まえて）

■ チームへの関わり方
（Takuがどのようにチームと関わっているかを具体的に）

■ 意識すべき盲点
（データと対話から見えてきた課題・注意点を率直に）
---

分量は300〜500字程度でまとめてください。`;

const INITIAL_MESSAGE = {
  role: 'assistant',
  content: `Takuさん、こんにちは。あなたのストレングスファインダーと個性診断のデータを読みました。

上位資質のTOP5（学習欲・分析思考・指令性・戦略性・個別化）と、個性診断のスコアを見て、いくつか仮説が浮かんできました。

まず最初に聞かせてください。

**「戦略性×分析思考×個別化」** という組み合わせからすると、Takuさんはチームの中で "一人ひとりの強みを見極めた上で、全体の動き方を設計する" という役割を自然に担っていそうです。言い換えると、「誰に何を任せるか」を俯瞰的に考えることが得意なタイプに見えます。

実際のところ、チームで動くとき、Takuさんはどんな役割を担うことが多いですか？`
};

const QUICK_REPLIES = [
  'よくファシリテーターになります',
  '計画を立てる役が多いです',
  'メンバーの相談に乗ることが多い',
  '実行より設計が好きです',
];

function App() {
  const [apiKey, setApiKey] = useState(() => localStorage.getItem('anthropic_api_key') || '');
  const [messages, setMessages] = useState([INITIAL_MESSAGE]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [summaryContent, setSummaryContent] = useState('');
  const bottomRef = useRef(null);
  const textareaRef = useRef(null);

  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages, loading, summaryContent]);

  const saveApiKey = (val) => {
    setApiKey(val);
    localStorage.setItem('anthropic_api_key', val);
  };

  const callAPI = useCallback(async (msgs) => {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1024,
        system: SYSTEM_PROMPT,
        messages: msgs,
      }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `API Error ${res.status}`);
    }

    const data = await res.json();
    return data.content[0].text;
  }, [apiKey]);

  const sendMessage = useCallback(async (text) => {
    const content = text.trim();
    if (!content || loading) return;
    if (!apiKey.trim()) { setError('APIキーを入力してください'); return; }

    setError('');
    const userMsg = { role: 'user', content };
    const newMessages = [...messages, userMsg];
    setMessages(newMessages);
    setInput('');
    setLoading(true);

    try {
      const apiMsgs = newMessages.map(m => ({ role: m.role, content: m.content }));
      const reply = await callAPI(apiMsgs);
      setMessages(prev => [...prev, { role: 'assistant', content: reply }]);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  }, [messages, loading, apiKey, callAPI]);

  const handleSummary = useCallback(async () => {
    if (loading) return;
    if (!apiKey.trim()) { setError('APIキーを入力してください'); return; }

    setError('');
    setLoading(true);
    setSummaryContent('');

    try {
      const summaryRequest = { role: 'user', content: 'SUMMARY_REQUEST\nここまでの対話をもとに「私のマネジメントスタイル」をまとめてください。' };
      const apiMsgs = [...messages.map(m => ({ role: m.role, content: m.content })), summaryRequest];
      const summary = await callAPI(apiMsgs);
      setSummaryContent(summary);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  }, [messages, loading, apiKey, callAPI]);

  const handleKeyDown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage(input);
    }
  };

  const adjustHeight = (e) => {
    e.target.style.height = 'auto';
    e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
  };

  const hasChatHistory = messages.length > 1;

  return (
    <>
      <div className="header">
        <h1>🧠 Management Coaching for Taku</h1>
        <p>ストレングスファインダー × 個性診断 → マネジメントスタイル壁打ち</p>
      </div>

      <div className="api-key-bar">
        <label>Anthropic API Key:</label>
        <input
          type="password"
          value={apiKey}
          onChange={e => saveApiKey(e.target.value)}
          placeholder="sk-ant-..."
          spellCheck={false}
        />
      </div>

      <div className="messages-area">
        {messages.map((m, i) => (
          <div key={i} className={`message ${m.role}`}>
            <div className="avatar">{m.role === 'assistant' ? '🧠' : 'T'}</div>
            <div className="bubble">{m.content}</div>
          </div>
        ))}

        {loading && (
          <div className="message assistant">
            <div className="avatar">🧠</div>
            <div className="bubble">
              <div className="typing-indicator">
                <span /><span /><span />
              </div>
            </div>
          </div>
        )}

        {summaryContent && (
          <div className="summary-block">
            <h2>📋 対話のまとめ</h2>
            {summaryContent}
          </div>
        )}

        {!loading && !summaryContent && hasChatHistory && (
          <div className="chip-list">
            {QUICK_REPLIES.map((r, i) => (
              <button key={i} className="chip" onClick={() => sendMessage(r)}>{r}</button>
            ))}
          </div>
        )}

        <div ref={bottomRef} />
      </div>

      <div className="input-area">
        {error && <div className="error-msg">⚠️ {error}</div>}

        <div className="input-row">
          <textarea
            ref={textareaRef}
            rows={1}
            value={input}
            onChange={e => { setInput(e.target.value); adjustHeight(e); }}
            onKeyDown={handleKeyDown}
            placeholder="Shift+Enterで改行、Enterで送信"
            disabled={loading}
          />
          <button
            className="btn-send"
            onClick={() => sendMessage(input)}
            disabled={!input.trim() || loading}
          >
            送信
          </button>
        </div>

        <div className="bottom-actions">
          <button
            className="btn-summary"
            onClick={handleSummary}
            disabled={loading || messages.length < 3}
            title={messages.length < 3 ? 'もう少し対話してからまとめましょう' : 'マネジメントスタイルをまとめる'}
          >
            📋 まとめる
          </button>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
